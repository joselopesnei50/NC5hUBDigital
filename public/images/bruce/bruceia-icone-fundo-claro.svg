<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0A0A0B; }
      .accent { fill: #FF7A1A; }
      .hole { fill: #0A0A0B; }
    </style>
  </defs>
  <!-- squircle background -->
  <rect class="bg" x="0" y="0" width="200" height="200" rx="46"/>

  <!-- monogram B built from stem + two bowls, with a node "hole" as the AI/data breakpoint -->
  <!-- stem -->
  <rect class="accent" x="58" y="46" width="26" height="108" rx="13"/>

  <!-- upper bowl -->
  <rect class="accent" x="58" y="44" width="76" height="58" rx="29"/>
  <rect class="hole" x="80" y="56" width="42" height="34" rx="17"/>

  <!-- lower bowl (slightly larger, classic B proportion) -->
  <rect class="accent" x="58" y="98" width="84" height="62" rx="31"/>
  <rect class="hole" x="80" y="110" width="48" height="38" rx="19"/>

  <!-- node: the data/connection breakpoint at the waist -->
  <circle class="hole" cx="132" cy="100" r="9"/>

  <!-- signal line extending from the node, subtle connection/growth cue -->
  <line x1="140" y1="94" x2="158" y2="76" stroke="#FF7A1A" stroke-width="5" stroke-linecap="round"/>
  <circle class="accent" cx="162" cy="72" r="6"/>
</svg>
